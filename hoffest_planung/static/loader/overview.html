<div id="approval-modal-backdrop" onclick="if(event.target===this)closeApprovalModal()">
  <div id="approval-modal">
    <h2>Stand prüfen: <span id="modal-stand-title"></span></h2>
    <div class="modal-info-row"><span class="modal-info-label">Lehrkraft</span><span id="modal-lehrer"></span></div>
    <div class="modal-info-row"><span class="modal-info-label">Klasse</span><span id="modal-klasse"></span></div>
    <div class="modal-info-row"><span class="modal-info-label">Projektname</span><span id="modal-titel"></span></div>
    <div class="modal-section-label">Beschreibung</div>
    <div id="modal-beschreibung" style="font-size:0.9em;color:#4a5568;line-height:1.5;"></div>
    <div class="modal-section-label">Ausgewählte Optionen</div>
    <ul id="modal-options" style="font-size:0.88em;color:#4a5568;margin:0 0 0 1.4em;padding:0;line-height:1.6;"></ul>
    <div class="modal-section-label">Kommentar</div>
    <textarea id="modal-comment" placeholder="Optionalen Kommentar hinzufügen (beim Ablehnen erforderlich, min. 10 Zeichen)"></textarea>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeApprovalModal()">Abbrechen</button>
      <button class="modal-btn-reject" onclick="modalRejectStand()">Ablehnen</button>
      <button class="modal-btn-accept" onclick="modalAcceptStand()">✓ Bestätigen</button>
    </div>
  </div>
</div>

<div
  style="width: 100%; height: 70vh; overflow: hidden; border: 1px solid #ccc"
>
  <div
    style="
      display: grid;
      width: 100%;
      height: 100%;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 100%;
    "
  >
    <!-- ── Linke Seite: SVG Karte ── -->
    <div
      style="
        background: white;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <svg
        id="svgCanvas"
        preserveAspectRatio="xMinYMin meet"
        viewBox="0 0 1478 940"
        style="width: 100%; height: 100%; display: block"
      >
        <image
          href="/static/plan.jpg"
          width="100%"
          style="pointer-events: none"
          preserveAspectRatio="xMinYMin meet"
          id="svgImage"
        ></image>
      </svg>
    </div>

    <!-- ── Rechte Seite: Infopanel ── -->
    <div
      style="
        background: #f0f4f8;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-sizing: border-box;
      "
    >
      <!-- Buttons -->
      <div
        style="
          padding: 10px;
          flex-shrink: 0;
          background: #e2e8f0;
          border-bottom: 1px solid #cbd5e0;
        "
      >
        <div
          style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px"
        >
          <button id="blackListBtnToggle">Zellen ausblenden</button>
          <button id="draggableBtnToggle">Stände verschieben</button>
          <button id="socketMarkerBtnToggle">Steckdosen einzeichnen</button>
          <button id="resetBtn" style="display: none">Aktion abbrechen</button>
          <select name="jahr" id="jahr-filter"></select>
        </div>
        <h3 style="margin: 0; font-size: 1em; color: #2d3748">Stand-Details</h3>
      </div>

      <!-- Oberer Bereich: Stand-Detailinfo (40%) -->
      <div
        style="
          flex: 2;
          display: flex;
          flex-direction: column;
          min-height: 0;
          padding: 8px 10px 4px 10px;
        "
      >
        <div
          id="standList"
          style="
            flex-grow: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 6px;
            padding: 8px;
            font-size: 0.88em;
            color: #2d3748;
          "
        >
          <p style="color: #718096; margin: 0">
            Bitte wähle einen Stand aus der Liste oder der Karte…
          </p>
        </div>
        <div id="resizeBtnToggleDiv" style="display: none; margin-top: 6px">
          <button id="resizeBtnToggle">Standgröße bearbeiten</button>
          <input type="color" id="stand_color" style="display: none;" name="stand_color" value="" onchange="alert('Farbe gewählt: ' + this.value)" />
          <label for="stand_color" id="stand_color_label" style="margin: 0 20px;padding:2px; border: 1px solid rgb(0, 0, 0); cursor: pointer;">Farbe ändern </label>
          <div style="display: inline-flex; align-items: center; gap: 5px; margin-left: 8px;">
            <input type="checkbox" id="bestaendig_toggle" />
            <label for="bestaendig_toggle" style="margin: 0; cursor: pointer; font-size: 0.9em;">Beständig</label>
          </div>
        </div>
      </div>

      <hr style="margin: 0; border: 0; border-top: 1px solid #cbd5e0" />

      <!-- Unterer Bereich: Standliste (60%) -->
      <div
        style="
          flex: 3;
          display: flex;
          flex-direction: column;
          min-height: 0;
          padding: 8px 10px 10px 10px;
        "
      >
        <h4
          style="
            margin: 0 0 6px 0;
            font-size: 0.9em;
            color: #4a5568;
            flex-shrink: 0;
          "
        >
          Alle Stände
          <span
            id="standCountBadge"
            style="
              background: #4a5568;
              color: white;
              border-radius: 999px;
              font-size: 0.75em;
              padding: 1px 7px;
              margin-left: 6px;
              font-weight: normal;
            "
            >0</span
          >
        </h4>
        <div id="allStandsList" style="flex: 1; overflow-y: auto">
          <p style="color: #a0aec0; font-size: 0.85em; margin: 0">
            Wird geladen…
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  body {
    margin: 0;
    padding: 0;
  }

  /* Scrollbars */
  #standList::-webkit-scrollbar,
  #allStandsList::-webkit-scrollbar {
    width: 5px;
  }
  #standList::-webkit-scrollbar-thumb,
  #allStandsList::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.18);
    border-radius: 10px;
  }

  /* Stand-Karten in der Liste */
  .stand-card {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 9px;
    margin-bottom: 5px;
    background: white;
    border-radius: 7px;
    border: 2px solid transparent;
    cursor: pointer;
    transition:
      border-color 0.15s,
      box-shadow 0.15s,
      background 0.15s;
    font-size: 0.83em;
    line-height: 1.35;
  }
  .stand-card:hover {
    background: #ebf4ff;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
  }
  .stand-card.active {
    border-color: #4299e1;
    background: #ebf8ff;
    box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
  }
  .stand-card.no-position {
    opacity: 0.5;
  }

  /* Farbpunkt links in der Karte */
  .stand-color-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
    border: 1px solid rgba(0, 0, 0, 0.15);
  }

  .stand-card-title {
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 1px;
  }
  .stand-card-meta {
    color: #718096;
  }
  .stand-card-badge {
    margin-left: auto;
    flex-shrink: 0;
    font-size: 0.75em;
    padding: 2px 6px;
    border-radius: 999px;
    background: #edf2f7;
    color: #718096;
    align-self: center;
  }
  .stand-card-badge.placed {
    background: #c6f6d5;
    color: #276749;
  }
  .stand-card-badge.pending {
    background: #fef3c7;
    color: #92400e;
  }
  .stand-card.pending {
    border-color: #fcd34d;
  }
  .stand-card.pending:hover {
    border-color: #f59e0b;
    background: #fffbeb;
  }
  .stand-card-actions {
    display: flex;
    gap: 4px;
    margin-top: 5px;
  }
  .stand-action-btn {
    font-size: 0.72em;
    padding: 3px 9px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .stand-action-btn:hover { opacity: 0.72; }
  .stand-action-btn.accept { background: #c6f6d5; color: #276749; }
  .stand-action-btn.more   { background: #e2e8f0; color: #2d3748; }

  /* Approval Modal */
  #approval-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.48);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #approval-modal-backdrop.open { display: flex; }
  #approval-modal {
    background: white;
    border-radius: 10px;
    padding: 24px;
    width: 480px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-height: 90vh;
    overflow-y: auto;
  }
  #approval-modal h2 { margin: 0 0 16px; font-size: 1.1em; color: #2d3748; }
  .modal-info-row {
    display: flex; gap: 8px; font-size: 0.88em;
    padding: 5px 0; border-bottom: 1px solid #f0f4f8;
  }
  .modal-info-label { font-weight: 600; color: #718096; min-width: 90px; }
  .modal-section-label {
    font-weight: 600; font-size: 0.82em; color: #718096;
    text-transform: uppercase; letter-spacing: 0.04em; margin: 14px 0 4px;
  }
  #approval-modal textarea {
    width: 100%; box-sizing: border-box; padding: 8px;
    border: 1px solid #cbd5e0; border-radius: 6px;
    font-size: 0.9em; min-height: 70px; resize: vertical; font-family: inherit;
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .modal-actions button {
    padding: 8px 16px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 0.88em; font-weight: 600;
    transition: opacity 0.15s; font-family: inherit;
  }
  .modal-actions button:hover { opacity: 0.8; }
  .modal-btn-accept { background: #48bb78; color: white; }
  .modal-btn-reject { background: #fc8181; color: white; }
  .modal-btn-cancel { background: #e2e8f0; color: #4a5568; }
</style>
